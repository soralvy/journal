name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - run: yarn install --immutable

      - run: yarn db:generate

      - run: yarn check-types

      - run: yarn lint

      - run: yarn test

      - run: yarn build
